# --- Model Hyperparameter Search Spaces ---
# These are defined in Python code since skopt types (Integer, Real)
# are not natively YAML-serializable.

# --- Pipeline Settings ---

pipeline:
  n_iter: 50           # Bayesian optimization iterations per model
  n_splits: 5          # Outer CV folds
  n_rules: 100         # Top leaf memberships for BIOM+rMRF
  n_subset: 30         # Top DCG features for BIOM+sMRF
  seed_cv: 0           # Inner CV random seed
  seed_rf: 0           # Model random seed
  seed_bayes: 0        # Bayesian search random seed

# --- ROC Plot Colors ---

plot_colors:
  libra: brown
  biom: magenta
  mrf: cyan
  biom_mrf: blue
  biom_smrf: green
  biom_rmrf: red
